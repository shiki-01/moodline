name: Release Extension

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package release assets
        run: |
          node scripts/package-zip.mjs "firedox-dist/moodline-${{ steps.ref.outputs.tag }}.zip"
          node scripts/package-zip.mjs "firedox-dist/moodline-${{ steps.ref.outputs.tag }}.xpi"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ref.outputs.tag }}
          generate_release_notes: true
          append_body: true
          body: |
            ## Assets
            - `moodline-${{ steps.ref.outputs.tag }}.zip`: Chrome 向けパッケージ
            - `moodline-${{ steps.ref.outputs.tag }}.xpi`: Firefox 向けパッケージ

            詳細な導入・ビルド手順は README を参照してください。
            https://github.com/${{ github.repository }}/blob/${{ steps.ref.outputs.tag }}/README.md
          files: |
            firedox-dist/moodline-${{ steps.ref.outputs.tag }}.zip
            firedox-dist/moodline-${{ steps.ref.outputs.tag }}.xpi
